<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>兰台云 — 业务工作流</title>
<style>@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{--bg:#f8fafc;--card-bg:#fff;--border:#e2e8f0;--text-primary:#0f172a;--text-muted:#64748b;--c-frontend:#dbeafe;--c-frontend-border:#3b82f6;--c-backend:#e0f2fe;--c-backend-border:#0ea5e9;--c-messagebus:#d1fae5;--c-messagebus-border:#10b981;--c-security:#fce7f3;--c-security-border:#ec4899;--c-database:#fef3c7;--c-database-border:#f59e0b;--arrow-color:#94a3b8;--arrow-emphasis:#3b82f6;--arrow-security:#ec4899;--c-waiting:#fef3c7;--c-waiting-border:#f59e0b}
[data-theme=dark]{--bg:#0f172a;--card-bg:#1e293b;--border:#334155;--text-primary:#f1f5f9;--text-muted:#94a3b8;--c-frontend:#1e3a5f;--c-frontend-border:#3b82f6;--c-backend:#0c4a6e;--c-backend-border:#0ea5e9;--c-messagebus:#064e3b;--c-messagebus-border:#10b981;--c-security:#500724;--c-security-border:#ec4899;--c-database:#451a03;--c-database-border:#f59e0b;--arrow-color:#64748b;--arrow-emphasis:#3b82f6;--arrow-security:#ec4899;--c-waiting:#451a03;--c-waiting-border:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text-primary);padding:20px;min-height:100vh}
.toolbar{position:fixed;top:12px;right:12px;display:flex;gap:6px;z-index:100}
.toolbar button{background:var(--card-bg);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.toolbar button:hover{background:var(--c-frontend)}
.diagram-container{max-width:1100px;margin:40px auto;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:30px;overflow-x:auto}
.title{text-align:center;margin-bottom:24px}
.title h1{font-size:20px;font-weight:700}
.title p{font-size:12px;color:var(--text-muted);margin-top:4px}
svg text{font-family:'JetBrains Mono',monospace}
.legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted)}.legend-swatch{width:12px;height:12px;border-radius:3px;border:1.5px solid}
</style></head>

<script>
function toggleTheme(){var d=document.documentElement;d.getAttribute('data-theme')==='light'?d.setAttribute('data-theme','dark'):d.setAttribute('data-theme','light')}
function downloadSVG(){var s=document.querySelector('svg'),c=s.cloneNode(!0);c.removeAttribute('width');c.setAttribute('xmlns','http://www.w3.org/2000/svg');var r=document.documentElement.getAttribute('data-theme'),st='';document.querySelectorAll('style').forEach(function(e){st+=e.textContent});var h='<svg xmlns="http://www.w3.org/2000/svg" data-theme="'+r+'" viewBox="'+s.getAttribute('viewBox')+'"><style>'+st+'</style>'+c.innerHTML+'</svg>';var b=new Blob([h],{type:'image/svg+xml'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='lantai-workflow.svg';a.click()}
function downloadPNG(){var s=document.querySelector('svg'),r=2,c=document.createElement('canvas'),ctx=c.getContext('2d'),vb=s.getAttribute('viewBox').split(' ').map(Number),w=vb[2],h=vb[3];c.width=w*r;c.height=h*r;var x=new XMLSerializer().serializeToString(s);var i=new Image;i.onload=function(){ctx.scale(r,r);ctx.fillStyle='var(--bg)';ctx.fillRect(0,0,w,h);ctx.drawImage(i,0,0);c.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='lantai-workflow.png';a.click()},'image/png')};i.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(x)))}
</script>

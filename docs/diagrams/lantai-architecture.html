body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text-primary);padding:20px;min-height:100vh}
.toolbar{position:fixed;top:12px;right:12px;display:flex;gap:6px;z-index:100}
.toolbar button{background:var(--card-bg);border:1px solid var(--border);color:var(--text-primary);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.toolbar button:hover{background:var(--c-frontend)}
.diagram-container{max-width:1200px;margin:40px auto;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:30px;overflow-x:auto}
.title{text-align:center;margin-bottom:24px}
.title h1{font-size:20px;font-weight:700}
.title p{font-size:12px;color:var(--text-muted);margin-top:4px}

.legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted)}
.legend-swatch{width:12px;height:12px;border-radius:3px;border:1.5px solid}

<script>
function toggleTheme(){var d=document.documentElement;d.getAttribute('data-theme')==='light'?d.setAttribute('data-theme','dark'):d.setAttribute('data-theme','light')}
function downloadSVG(){var s=document.querySelector('svg'),c=s.cloneNode(!0);c.removeAttribute('width');c.setAttribute('xmlns','http://www.w3.org/2000/svg');var r=document.documentElement.getAttribute('data-theme'),st='';document.querySelectorAll('style').forEach(function(e){st+=e.textContent});var h='<svg xmlns="http://www.w3.org/2000/svg" data-theme="'+r+'" viewBox="'+s.getAttribute('viewBox')+'"><style>'+st+'</style>'+c.innerHTML+'</svg>';var b=new Blob([h],{type:'image/svg+xml'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='lantai-architecture.svg';a.click()}
function downloadPNG(){var s=document.querySelector('svg'),r=2,c=document.createElement('canvas'),ctx=c.getContext('2d'),vb=s.getAttribute('viewBox').split(' ').map(Number),w=vb[2],h=vb[3];c.width=w*r;c.height=h*r;var x=new XMLSerializer().serializeToString(s);var i=new Image;i.onload=function(){ctx.scale(r,r);ctx.fillStyle='var(--bg)';ctx.fillRect(0,0,w,h);ctx.drawImage(i,0,0);c.toBlob(function(b){var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='lantai-architecture.png';a.click()},'image/png')};i.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(x)))}
